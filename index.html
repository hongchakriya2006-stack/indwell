<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可爱小站点</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #fff7fb;
        }
        /* 顶部导航栏 */
        nav {
            background: #ffb6c1;
            padding: 18px;
            border-bottom-left-radius: 22px;
            border-bottom-right-radius: 22px;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-size: 17px;
            margin: 0 12px;
            font-weight: 500;
        }
        nav a:hover {
            color: #d64878;
        }
        /* 主体卡片 */
        .box {
            width: 90%;
            max-width: 550px;
            margin: 60px auto;
            background: #ffffff;
            padding: 50px 30px;
            border-radius: 30px;
            box-shadow: 0 6px 15px #ffd6e3;
            text-align: center;
        }
        h1 {
            color: #d64878;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 35px;
        }
        .button {
            background: #ff8fb1;
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.3s;
        }
        .button:hover {
            background: #ff5f92;
        }
    </style>
</head>
<body>
    <!--导航菜单-->
    <nav>
        <a href="#">首页</a>
        <a href="#">关于我们</a>
        <a href="#">作品</a>
        <a href="#">联系方式</a>
    </nav>

    <div class="box">
        <h1>🍰 欢迎来到可爱小网站</h1>
        <p>粉嫩简约风格网页，自带导航菜单栏，电脑手机都适配，一键修改文字和颜色</p>
        <a class="button" href="#">探索更多</a>
    </div>
</body>
</html>
